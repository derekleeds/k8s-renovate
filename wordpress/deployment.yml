---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  selector:
    matchLabels:
      app: wordpress
  replicas: 1
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress@sha256:15a6fe7b6917918be9a1901952e98062e5f7b1dadc3e6acebbdcd046233f7f34
          ports:
            - containerPort: 80